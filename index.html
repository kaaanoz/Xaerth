<!DOCTYPE html><html lang="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Xaerth</title><style>

body{
margin:0;
background:#0b0b12;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
overflow:hidden;
}

/* texto principal */

#manana{
font-size:clamp(60px,10vw,140px);
color:#8b0000;
font-weight:bold;
cursor:pointer;
position:relative;
text-shadow:0 0 15px #8b0000;
}

/* gotas de sangre */

#manana::after{
content:"";
position:absolute;
left:50%;
top:100%;
width:6px;
height:25px;
background:#8b0000;
border-radius:50%;
animation:drip 2s infinite;
}

@keyframes drip{

0%{
height:10px;
opacity:0;
}

50%{
height:35px;
opacity:1;
}

100%{
height:50px;
opacity:0;
}

}

/* contador */

#contador{
margin-top:30px;
font-size:clamp(25px,5vw,40px);
display:none;
}

</style></head><body><div><div id="manana" onclick="mostrarContador()">MAÑANA</div><div id="contador"></div></div><script>

/* detectar idioma */

let idioma = navigator.language || navigator.userLanguage;

if(idioma.startsWith("en")){
document.getElementById("manana").innerText="TOMORROW";
}

if(idioma.startsWith("pt")){
document.getElementById("manana").innerText="AMANHÃ";
}

/* fecha objetivo */

const objetivo = new Date("March 16, 2026 18:45:00");

function mostrarContador(){

document.getElementById("contador").style.display="block";

setInterval(()=>{

let ahora = new Date();

let diferencia = objetivo - ahora;

let dias = Math.floor(diferencia / (1000*60*60*24));
let horas = Math.floor((diferencia / (1000*60*60)) % 24);
let minutos = Math.floor((diferencia / (1000*60)) % 60);
let segundos = Math.floor((diferencia / 1000) % 60);

document.getElementById("contador").innerHTML =
dias+"d "+horas+"h "+minutos+"m "+segundos+"s";

},1000);

}

</script></body>
</html>
