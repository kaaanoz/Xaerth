<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAERTH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--fondo:#0b0f0c;
--verde:#00ff9c;
--texto:#d8ffe9;
}

body{
margin:0;
background:var(--fondo);
color:var(--texto);
font-family:'Inter',sans-serif;
text-align:center;
}

/* RESPONSIVE */
h1{font-size:clamp(22px,5vw,40px); color:var(--verde);}

input,button{
width:clamp(200px,80%,400px);
margin:5px;
padding:10px;
border-radius:15px;
border:1px solid var(--verde);
background:transparent;
color:var(--texto);
}

/* ADMIN BTN */
#panelBtn{
position:fixed;
bottom:15px;
right:15px;
}

/* REG PANEL */
#regPanel{
display:none;
position:fixed;
top:10px;
right:10px;
width:300px;
max-height:300px;
overflow:auto;
background:black;
padding:10px;
}

/* MANTENIMIENTO */
#mantenimiento{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* CREDITOS */
#creditos h2{
font-family:'Orbitron';
color:var(--verde);
text-shadow:0 0 10px var(--verde);
}
</style>
</head>

<body>

<h1>XAERTH</h1>

<input id="search" placeholder="Buscar..." oninput="sugerir()">
<button onclick="buscar()">Entrar</button>

<div id="resultado"></div>

<button id="panelBtn" onclick="login()">PANEL</button>

<div id="regPanel"></div>

<script>

/* REGISTROS */
function guardarRegistro(txt){
let r=JSON.parse(localStorage.getItem("reg"))||[];
r.push(new Date().toLocaleString()+" - "+txt);
localStorage.setItem("reg",JSON.stringify(r));
}

/* MANTENIMIENTO */
if(localStorage.getItem("mant")=="on"){
document.body.innerHTML=`
<div id="mantenimiento">
<h2>XAERTH EN MANTENIMIENTO</h2>
<input id="clave">
<button onclick="salir()">Entrar</button>
</div>`;
}

function salir(){
let c=clave.value;

if(c==="2140"||c==="QUITAR MANTENIMIENTO"){
localStorage.removeItem("mant");
location.reload();
}else alert("Incorrecto");
}

/* ADMIN */
function login(){
let c=prompt("Clave:");
if(c==="2140"){

resultado.innerHTML=`
<h2>PANEL ADMIN</h2>

<button onclick="activarMant()">🛑 Activar Mantenimiento</button>
<button onclick="desactivarMant()">✅ Desactivar Mantenimiento</button>

<br><button onclick="verReg()">📊 REGISTROS</button>

<br><input id="color"><button onclick="colorWeb()">🎨 Color</button>
<br><input id="fondo"><button onclick="fondoWeb()">🖼 Fondo</button>
<br><input id="fuente"><button onclick="fuenteWeb()">🔤 Fuente</button>

<br><input id="mensaje"><button onclick="mensajeWeb()">📢 Anuncio</button>

<br><button onclick="modoFocus()">🎯 Modo Focus</button>
<br><button onclick="reset()">♻️ Reset Web</button>
`;

guardarRegistro("Admin activado");

}else alert("Incorrecto");
}

/* ADMIN FUNCIONES */
function activarMant(){
localStorage.setItem("mant","on");
location.reload();
}

function desactivarMant(){
localStorage.removeItem("mant");
location.reload();
}

function verReg(){
let r=JSON.parse(localStorage.getItem("reg"))||[];
regPanel.style.display="block";
regPanel.innerHTML="<h3>REGISTROS</h3>";
r.slice().reverse().forEach(x=>regPanel.innerHTML+="<p>"+x+"</p>");
}

function colorWeb(){
document.body.style.color=color.value;
}

function fondoWeb(){
document.body.style.background="url("+fondo.value+") center/cover";
}

function fuenteWeb(){
document.body.style.fontFamily=fuente.value;
}

function mensajeWeb(){
alert(mensaje.value);
}

function modoFocus(){
document.body.style.background="black";
resultado.innerHTML="Modo enfoque activado";
}

function reset(){
localStorage.clear();
location.reload();
}

/* SUGERENCIAS */
function sugerir(){
let t=search.value.toLowerCase();
resultado.innerHTML="";

if(t.startsWith("c")){
resultado.innerHTML+=`<p onclick="usar('calendario')">Calendario</p>`;
resultado.innerHTML+=`<p onclick="usar('calculadora')">Calculadora</p>`;
resultado.innerHTML+=`<p onclick="usar('creditos')">Créditos</p>`;
}

if(t.startsWith("t")){
resultado.innerHTML+=`<p onclick="usar('traductor')">Traductor</p>`;
}

if(t.startsWith("r")){
resultado.innerHTML+=`<p onclick="usar('limites')">LÍMITES</p>`;
}
}

function usar(x){
search.value=x;
buscar();
}

/* BUSCAR */
function buscar(){
let t=search.value.toLowerCase();
guardarRegistro(t);

/* CALENDARIO */
if(t.includes("calendario")){
let d=new Date();
resultado.innerHTML="<h2>Calendario</h2>"+d.toLocaleDateString();
return;
}

/* CALCULADORA */
if(t.includes("calculadora")){
resultado.innerHTML=`<input id="calc"><button onclick="calc()">=</button><div id="res"></div>`;
return;
}

/* TRADUCTOR SIMPLE */
if(t.includes("traductor")){
resultado.innerHTML=`<input id="txt"><button onclick="trad()">Traducir</button><div id="res"></div>`;
return;
}

function trad(){
res.innerText=txt.value.split("").reverse().join("");
}

/* CREDITOS */
if(t.includes("creditos")){
resultado.innerHTML=`
<div id="creditos">
<p>Página web creada por: LUCAS ☁️, El 👁️</p>
<p>Queremos crear un navegador independiente...</p>
<h2>SOMOS XAERTH</h2>
</div>`;
return;
}

/* LIMITES */
if(t.includes("limites")){
resultado.innerHTML=`<h2>ESTABLECER LIMITES</h2><div id="contador"></div>`;
setInterval(()=>{
let f=new Date("March 26 2026 19:40:00").getTime();
let n=new Date().getTime();
let d=f-n;
let h=Math.floor(d/3600000);
let m=Math.floor((d%3600000)/60000);
let s=Math.floor((d%60000)/1000);
contador.innerText=h+"h "+m+"m "+s+"s";
},1000);
return;
}

resultado.innerHTML="XAERTH procesando...";
}

/* CALC */
function calc(){
res.innerText=eval(calc.value);
}

</script>

</body>
</html>
