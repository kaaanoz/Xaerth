<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAERTH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--verde:#00ff9c;
--fondo:#0b0f0c;
--texto:#d8ffe9;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--fondo);
color:var(--texto);
text-align:center;
overflow-x:hidden;
}

/* ☁️ NUBES */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03), transparent 40%);
animation:moverNubes 40s linear infinite;
z-index:-1;
}

@keyframes moverNubes{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

/* HEADER */
#top{
display:flex;
justify-content:space-between;
padding:10px;
font-size:14px;
opacity:0.8;
}

/* TITULO */
h1{
color:var(--verde);
font-size:clamp(24px,5vw,40px);
margin-bottom:5px;
}

/* LEMA */
.lema{
font-size:13px;
opacity:0.7;
color:var(--verde);
}

/* INPUT */
input{
width:clamp(200px,80%,400px);
padding:10px;
border-radius:20px;
border:1px solid var(--verde);
background:transparent;
color:var(--texto);
}

/* BOTONES */
button{
margin:5px;
padding:10px;
border-radius:20px;
border:1px solid var(--verde);
background:transparent;
color:var(--verde);
cursor:pointer;
transition:0.2s;
}

button:hover{
background:rgba(0,255,156,0.1);
}

/* PANEL ADMIN */
.adminBtn{
display:block;
width:90%;
margin:8px auto;
}

/* BOTON PELIGRO */
.peligro{
background:black;
border:1px solid red;
color:red;
font-weight:bold;
}

/* MANTENIMIENTO */
#mantenimiento{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* RESULTADO */
#resultado{
margin-top:20px;
padding:10px;
}

/* RESPONSIVE */
@media(max-width:600px){
input,button{width:90%;}
}
</style>
</head>

<body>

<div id="top">
<div id="fecha"></div>
</div>

<h1>XAERTH</h1>
<p class="lema">Aquí la inteligencia humana y la artificial dejan de ser distintas.</p>

<input id="search" placeholder="Buscar..." oninput="sugerir()">
<br>
<button onclick="buscar()">Entrar</button>
<button onclick="actualizaciones()">ACTUALIZACIONES FUTURAS</button>

<div id="resultado"></div>

<button onclick="login()">PANEL</button>

<script>

/* FECHA */
setInterval(()=>{
let now=new Date();
fecha.innerText=now.toLocaleString();
},1000);

/* REGISTROS */
function guardarRegistro(txt){
let r=JSON.parse(localStorage.getItem("reg"))||[];
r.push(new Date().toLocaleString()+" - "+txt);
localStorage.setItem("reg",JSON.stringify(r));
}

/* MANTENIMIENTO */
if(localStorage.getItem("mant")=="on"){
document.body.innerHTML=`
<div id="mantenimiento">
<h2>XAERTH EN MANTENIMIENTO</h2>
<input id="clave">
<button onclick="salir()">Entrar</button>
</div>`;
}

function salir(){
let c=clave.value;
if(c==="2140"||c==="QUITAR MANTENIMIENTO"){
localStorage.removeItem("mant");
location.reload();
}else alert("Incorrecto");
}

/* ADMIN */
function login(){
let c=prompt("Clave:");

if(c==="2140"){
resultado.innerHTML=`
<h2>PANEL ADMIN</h2>

<button class="adminBtn" onclick="activarMant()">🛑 Activar mantenimiento</button>
<button class="adminBtn" onclick="desactivarMant()">✅ Desactivar mantenimiento</button>

<button class="adminBtn" onclick="verReg()">📊 Ver registros</button>

<input id="color"><button class="adminBtn" onclick="cambiarColor()">🎨 Color</button>
<input id="fondo"><button class="adminBtn" onclick="cambiarFondo()">🖼 Fondo</button>
<input id="fuente"><button class="adminBtn" onclick="cambiarFuente()">🔤 Fuente</button>

<input id="mensaje"><button class="adminBtn" onclick="mensajeGlobal()">📢 Mensaje global</button>

<button class="adminBtn peligro" onclick="reiniciar()">⚠️ REINICIAR TODA LA WEB</button>
`;

guardarRegistro("Admin activado");
}else alert("Incorrecto");
}

/* ADMIN FUNCIONES */
function activarMant(){
localStorage.setItem("mant","on");
}

function desactivarMant(){
localStorage.removeItem("mant");
alert("Mantenimiento desactivado");
}

function verReg(){
let r=JSON.parse(localStorage.getItem("reg"))||[];
resultado.innerHTML="<h3>REGISTROS</h3>";
r.slice().reverse().forEach(x=>resultado.innerHTML+="<p>"+x+"</p>");
}

function cambiarColor(){
document.body.style.color=color.value;
}

function cambiarFondo(){
document.body.style.background="url("+fondo.value+") center/cover";
}

function cambiarFuente(){
document.body.style.fontFamily=fuente.value;
}

function mensajeGlobal(){
localStorage.setItem("msg",mensaje.value);
alert("Mensaje guardado");
}

/* MOSTRAR MENSAJE GLOBAL */
if(localStorage.getItem("msg")){
alert(localStorage.getItem("msg"));
}

/* REINICIAR */
function reiniciar(){
let c=prompt("Clave reinicio:");
if(c==="2014"){
localStorage.clear();
location.reload();
}else alert("Incorrecto");
}

/* ACTUALIZACIONES */
function actualizaciones(){
resultado.innerHTML=`
<h2>PRONTO LES CONTAREMOS QUÉ ES LO QUE SE APROXIMA EN XAERTH 🤫</h2>
<br><br>
<h3>XAERTH</h3>
<p>somosxaerth@gmail.com</p>
`;
}

/* SUGERENCIAS */
function sugerir(){
let t=search.value.toLowerCase();
resultado.innerHTML="";

if(t.startsWith("c")){
resultado.innerHTML+=`<p onclick="usar('calendario')">Calendario</p>`;
resultado.innerHTML+=`<p onclick="usar('calculadora')">Calculadora</p>`;
resultado.innerHTML+=`<p onclick="usar('creditos')">Créditos</p>`;
}
}

function usar(x){
search.value=x;
buscar();
}

/* BUSCAR */
function buscar(){
let t=search.value.toLowerCase();
guardarRegistro(t);

/* CALENDARIO */
if(t.includes("calendario")){
resultado.innerHTML=new Date().toLocaleDateString();
return;
}

/* CALCULADORA */
if(t.includes("calculadora")){
resultado.innerHTML=`<input id="calc"><button onclick="calc()">=</button><div id="res"></div>`;
return;
}

/* CREDITOS */
if(t.includes("creditos")){
resultado.innerHTML=`
<p>Página web creada por: LUCAS ☁️, El 👁️</p>
<p>En esta web queremos crear un navegador independiente, crear límites pero también libertad...</p>

<h2 style="font-family:Orbitron;color:#00ff9c;">XAERTH</h2>
<p>"Aquí la inteligencia humana y la artificial dejan de ser distintas."</p>
<p>somosxaerth@gmail.com</p>
`;
return;
}

resultado.innerHTML="XAERTH procesando...";
}

/* CALC */
function calc(){
res.innerText=eval(calc.value);
}

</script>

</body>
</html>
