<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAERTH</title>

<style>
:root{
--verde:#00ff9c;
--fondo:#0b0f0c;
--texto:#d8ffe9;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--fondo);
color:var(--texto);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#info{
position:fixed;
top:10px;
left:10px;
font-size:11px;
opacity:0.4;
max-width:280px;
}

#titulo{
font-size:32px;
color:var(--verde);
margin-bottom:10px;
}

#carpeta{
padding:14px 20px;
border:1px solid var(--verde);
border-radius:12px;
cursor:pointer;
font-weight:bold;
color:var(--verde);
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%{opacity:1;}
51%,100%{opacity:0.25;}
}

#panel{
display:none;
margin-top:20px;
text-align:center;
}

#textoVideo{
font-size:13px;
opacity:0.85;
margin-bottom:10px;
}

#contador{
font-size:22px;
margin:10px;
}

#link{
display:none;
margin-top:15px;
}

#link a{
color:var(--verde);
text-decoration:none;
border:1px solid var(--verde);
padding:10px 15px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="info"></div>

<div id="titulo">XAERTH</div>

<div id="carpeta" onclick="abrir()">Para: PAPÁ</div>

<div id="panel">

<div id="textoVideo">🎥 Hay un vídeo que se desbloqueará en:</div>

<div id="contador"></div>

<div id="link">
<a href="https://drive.google.com/drive/folders/1LrCRhJeaz-eEYGim3b9ujXQnBJOJamf0" target="_blank">
ABRIR
</a>
</div>

</div>

<script>

/* 🕒 reloj esquina Santiago */
function actualizarInfo(){
document.getElementById("info").innerText =
"📅 " + new Date().toLocaleString("es-CL", {
timeZone:"America/Santiago",
year:"numeric",
month:"2-digit",
day:"2-digit",
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
});
}
setInterval(actualizarInfo,1000);
actualizarInfo();

/* 🎯 TARGET FIJO 01:00 AM (HOY O MAÑANA SI YA PASÓ) */
function getTarget(){
  const now = new Date();
  const target = new Date(now);
  target.setHours(1,0,0,0);

  if(now.getTime() > target.getTime()){
    target.setDate(target.getDate() + 1);
  }

  return target.getTime();
}

let target = getTarget();
let intervalo = null;

function abrir(){

document.getElementById("panel").style.display="block";

if(intervalo) return;

intervalo = setInterval(()=>{

let now = Date.now();
let diff = target - now;

if(diff <= 0){
document.getElementById("contador").style.display="none";
document.getElementById("textoVideo").style.display="none";
document.getElementById("link").style.display="block";
clearInterval(intervalo);
return;
}

let h = Math.floor(diff/3600000);
let m = Math.floor((diff%3600000)/60000);
let s = Math.floor((diff%60000)/1000);

document.getElementById("contador").innerText =
`${h}h ${m}m ${s}s`;

},1000);
}

</script>

</body>
</html>
