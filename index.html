<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>

:root {
  --fondo: #0b0f0c;
  --verde: #00ff9c;
  --verde-suave: #00cc7a;
  --gris: #1a1f1c;
  --texto: #d8ffe9;
}

body{
background: var(--fondo);
color: var(--texto);
font-family:'Inter',sans-serif;
text-align:center;
margin-top:100px;
transition:0.3s;
}

#reloj{
color: var(--verde);
margin-bottom:20px;
}

/* TITULO */
h1{
color: var(--verde);
text-shadow: 0 0 10px rgba(0,255,156,0.5);
}

/* INPUT BUSCADOR PRO */
input{
padding:12px;
width:90%;
max-width:350px;
border-radius:20px;
border:1px solid rgba(0,255,156,0.3);
background: transparent;
color: var(--texto);
margin:5px;
outline:none;
backdrop-filter: blur(6px);
transition:0.3s;
}

input::placeholder{
color: rgba(200,255,220,0.5);
}

input:focus{
border:1px solid var(--verde);
box-shadow: 0 0 12px rgba(0,255,156,0.6);
}

/* BOTONES */
button{
padding:10px 20px;
border-radius:20px;
background: transparent;
border:1px solid var(--verde);
color: var(--verde);
cursor:pointer;
margin:5px;
transition:0.3s;
}

button:hover{
background: rgba(0,255,156,0.1);
box-shadow: 0 0 10px rgba(0,255,156,0.5);
}

/* ADMIN */
#adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:#002e1a;
color: var(--verde);
padding:12px;
border-radius:20px;
cursor:pointer;
z-index:9999;
border:1px solid var(--verde);
}

/* REGISTROS */
#registrosBtn{
position:fixed;
top:20px;
right:20px;
background:#002e1a;
padding:10px;
border-radius:15px;
cursor:pointer;
display:none;
z-index:9999;
color: var(--verde);
border:1px solid var(--verde);
}

#panelRegistros{
display:none;
position:fixed;
top:60px;
right:20px;
width:300px;
max-height:400px;
overflow:auto;
background: rgba(0,0,0,0.7);
padding:15px;
border-radius:15px;
z-index:9999;
color: var(--texto);
backdrop-filter: blur(10px);
}

/* MANTENIMIENTO */
#mantenimiento{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
color: var(--verde);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:30px;
z-index:9998;
}

</style>
