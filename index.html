<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XAERTH ERROR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
background:black;
color:#00ff9c;
font-family:'Orbitron',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
flex-direction:column;
}

/* EFECTO PANTALLA ROTA */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:repeating-linear-gradient(
45deg,
rgba(0,255,156,0.05) 0px,
rgba(0,255,156,0.05) 2px,
transparent 2px,
transparent 6px
);
animation:glitchBG 0.3s infinite;
}

@keyframes glitchBG{
0%{transform:translate(0,0);}
50%{transform:translate(-5px,5px);}
100%{transform:translate(5px,-5px);}
}

/* TEXTO ERROR */
#error{
font-size:80px;
cursor:pointer;
position:relative;
}

#error::before,
#error::after{
content:"ERROR";
position:absolute;
left:0;
}

#error::before{
color:red;
transform:translate(-3px,0);
opacity:0.7;
}

#error::after{
color:blue;
transform:translate(3px,0);
opacity:0.7;
}

/* CONTADOR */
#contador{
margin-top:20px;
font-size:30px;
display:none;
text-shadow:0 0 10px #00ff9c;
}
</style>
</head>

<body>

<div id="error" onclick="activar()">ERROR</div>
<div id="contador"></div>

<script>

let fechaObjetivo = new Date("March 21, 2026 13:03:00").getTime();

function activar(){
document.getElementById("contador").style.display="block";

setInterval(()=>{
let ahora = new Date().getTime();
let diferencia = fechaObjetivo - ahora;

if(diferencia <= 0){
document.getElementById("contador").innerText = "00:00:00";
return;
}

let dias = Math.floor(diferencia / (1000*60*60*24));
let horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
let minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
let segundos = Math.floor((diferencia % (1000*60)) / 1000);

document.getElementById("contador").innerText =
dias+"d "+horas+"h "+minutos+"m "+segundos+"s";

},1000);
}

</script>

</body>
</html>
