<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAERTH</title>

<style>
:root{
--xaerth:#00ff9c;
--bg:#0b0f0c;
--text:#d8ffe9;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
}

/* título */
#titulo{
font-size:32px;
color:var(--xaerth);
margin-bottom:10px;
}

/* texto bloqueado */
#estado{
font-size:14px;
opacity:0.8;
margin-bottom:10px;
}

/* contador */
#contador{
font-size:28px;
color:var(--xaerth);
margin:10px;
}

/* botón link */
#link{
display:none;
margin-top:20px;
}

#link a{
color:var(--xaerth);
text-decoration:none;
border:1px solid var(--xaerth);
padding:12px 18px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="titulo">XAERTH</div>

<div id="estado">🎁⌛</div>

<div id="contador"></div>

<div id="link">
<a href="https://drive.google.com/drive/folders/1LrCRhJeaz-eEYGim3b9ujXQnBJOJamf0" target="_blank">
ABRIR
</a>
</div>

<script>

/* 🎯 21 JUNIO 20:55 (hora local del navegador / Chile si está en Chile) */
function getTarget(){
  const now = new Date();
  const target = new Date(2026, 5, 21, 20, 55, 0); 
  return target.getTime();
}

let target = getTarget();
let unlocked = false;

function update(){

const now = Date.now();
const diff = target - now;

if(diff <= 0){

if(!unlocked){
document.getElementById("contador").style.display="none";
document.getElementById("estado").innerText="🎉 DESBLOQUEADO";
document.getElementById("link").style.display="block";
unlocked = true;
}

return;
}

let h = Math.floor(diff/3600000);
let m = Math.floor((diff%3600000)/60000);
let s = Math.floor((diff%60000)/1000);

document.getElementById("contador").innerText =
`${h}h ${m}m ${s}s`;

}

setInterval(update,1000);
update();

</script>

</body>
</html>
