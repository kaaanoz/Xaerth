<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaerth PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
  --fondo:#0b0f0c;
  --verde:#00ff9c;
  --texto:#d8ffe9;
}

body{
background:var(--fondo);
color:var(--texto);
font-family:'Inter',sans-serif;
text-align:center;
margin-top:80px;
}

h1{
color:var(--verde);
text-shadow:0 0 10px rgba(0,255,156,0.5);
}

input{
padding:12px;
width:90%;
max-width:350px;
border-radius:20px;
border:1px solid rgba(0,255,156,0.3);
background:transparent;
color:var(--texto);
outline:none;
}

input:focus{
box-shadow:0 0 10px var(--verde);
}

button{
margin:10px;
padding:10px 20px;
border-radius:20px;
background:transparent;
border:1px solid var(--verde);
color:var(--verde);
cursor:pointer;
}

button:hover{
background:rgba(0,255,156,0.1);
}

#resultado p{
cursor:pointer;
padding:8px;
}

#resultado p:hover{
background:rgba(0,255,156,0.1);
}

/* NAVEGADOR */
#web{
width:100%;
height:400px;
border:none;
margin-top:20px;
display:none;
}
</style>
</head>

<body>

<h1>XAERTH</h1>

<input id="search" placeholder="Buscar..." oninput="sugerir()">
<br>
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

<iframe id="web"></iframe>

<script>

/* SUGERENCIAS */
function sugerir(){
let texto=document.getElementById("search").value.toLowerCase();
let r=document.getElementById("resultado");
r.innerHTML="";

if(texto==="") return;

if(texto.startsWith("c")){
r.innerHTML+=`<p onclick="usar('calendario')">📅 Calendario</p>`;
r.innerHTML+=`<p onclick="usar('créditos')">👁️ Créditos</p>`;
r.innerHTML+=`<p onclick="usar('calculadora')">🧮 Calculadora</p>`;
}

if(texto.startsWith("t")){
r.innerHTML+=`<p onclick="usar('traductor')">🌐 Traductor</p>`;
}

if(texto.startsWith("s")){
r.innerHTML+=`<p onclick="usar('servicio')">📧 Servicio al Cliente</p>`;
}
}

/* USAR SUGERENCIA */
function usar(x){
document.getElementById("search").value=x;
buscar();
}

/* ABRIR WEB */
function abrir(url){
let web=document.getElementById("web");
web.style.display="block";
web.src=url;
}

/* BUSCAR */
function buscar(){
let t=document.getElementById("search").value.toLowerCase();
let r=document.getElementById("resultado");
r.innerHTML="";

/* FUNCIONES */
if(t.includes("youtube")){
abrir("https://youtube.com");
return;
}

if(t.includes("traductor")){
abrir("https://translate.google.com");
return;
}

if(t.includes("calendario")){
abrir("https://whatisme12.github.io/Calendario/");
return;
}

/* SERVICIO */
if(t.includes("servicio")){
r.innerHTML="📧 somosxaerth@gmail.com";
return;
}

/* CRÉDITOS */
if(t.includes("créditos") || t.includes("creditos")){
r.innerHTML=`
<h2>Creadores</h2>
<p>- Lucas</p>
<p>- 👁️</p>
<p>Inspirado en Google, creado combinando código e IA.</p>
`;
return;
}

/* CALCULADORA */
if(t.includes("calculadora")){
r.innerHTML=`
<input id="calc" placeholder="2+2">
<button onclick="calc()">=</button>
<div id="res"></div>
`;
return;
}

/* BUSQUEDA REAL */
abrir("https://www.google.com/search?q="+t);
}

/* CALCULADORA */
function calc(){
let v=document.getElementById("calc").value;
try{
document.getElementById("res").innerText=eval(v);
}catch{
document.getElementById("res").innerText="Error";
}
}

</script>

</body>
</html>
