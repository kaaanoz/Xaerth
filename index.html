<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaerth</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet"><style>

body{
background:#0b0b12;
color:#b46cff;
font-family:'Poppins',sans-serif;
text-align:center;
margin-top:120px;
}

/* botón admin flotante */
#adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:#7b2cff;
color:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
z-index:9999;
}

/* panel admin */
#adminPanel{
display:none;
position:fixed;
bottom:70px;
right:20px;
background:#151523;
padding:15px;
border-radius:15px;
z-index:9999;
width:250px;
}

/* mantenimiento */
#mantenimiento{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
color:red;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
z-index:9998;
text-align:center;
}

input, button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
background:#7b2cff;
color:white;
cursor:pointer;
}

#sugerencias{
width:90%;
max-width:350px;
margin:auto;
background:#151523;
border-radius:15px;
margin-top:5px;
}

.sugerencia{
padding:10px;
cursor:pointer;
color:white;
}

.sugerencia:hover{
background:#7b2cff;
}

</style></head><body><h1>Xaerth</h1><input id="search" placeholder="Buscar..." oninput="sugerir()">
<div id="sugerencias"></div><br><button onclick="buscar()">Buscar</button>

<div id="resultado"></div><!-- BOTÓN ADMIN --><div id="adminBtn" onclick="abrirAdmin()">Admin Mode</div><!-- PANEL ADMIN --><div id="adminPanel"><input id="clave" placeholder="Clave"><button onclick="verificar()">Entrar</button>

<div id="adminControles" style="display:none;"><button onclick="activarMantenimiento()">Mantenimiento</button>
<button onclick="desactivarMantenimiento()">Activar Web</button>

<br><input type="color" onchange="cambiarColor(this.value)">
<input type="file" onchange="cambiarFondo(event)"><br><input id="anuncio" placeholder="Anuncio">
<button onclick="guardarAnuncio()">Publicar</button></div></div><script>

/* abrir panel */
function abrirAdmin(){
let panel=document.getElementById("adminPanel");
panel.style.display = panel.style.display==="block"?"none":"block";
}

/* login */
function verificar(){
let clave=document.getElementById("clave").value;

if(clave==="2140"){
document.getElementById("adminControles").style.display="block";
alert("Admin activado");
}else{
alert("Clave incorrecta");
}
}

/* mantenimiento */
function activarMantenimiento(){
localStorage.setItem("modo","mantenimiento");
location.reload();
}

function desactivarMantenimiento(){
localStorage.removeItem("modo");
location.reload();
}

/* color */
function cambiarColor(color){
document.body.style.background=color;
localStorage.setItem("color",color);
}

/* fondo imagen */
function cambiarFondo(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(){
document.body.style.backgroundImage=`url(${reader.result})`;
document.body.style.backgroundSize="cover";
localStorage.setItem("fondo",reader.result);
};

reader.readAsDataURL(file);
}

/* anuncio */
function guardarAnuncio(){
let txt=document.getElementById("anuncio").value;
localStorage.setItem("anuncio",txt);
location.reload();
}

/* sugerencias */
function sugerir(){
let texto=document.getElementById("search").value.toLowerCase();
let box=document.getElementById("sugerencias");

box.innerHTML="";

if(texto.startsWith("t")){
box.innerHTML+=`<div class="sugerencia" onclick="window.location.href='https://whatisme12.github.io/xar/'">Traductor Xaerth</div>`;
}

if(texto.startsWith("c") || texto.includes("cal")){
box.innerHTML+=`<div class="sugerencia" onclick="window.location.href='https://whatisme12.github.io/Calendario/'">Calendario Xaerth</div>`;
}
}

/* buscar */
let datos = JSON.parse(localStorage.getItem("xaerth")) || [];

function buscar(){
let texto=document.getElementById("search").value.toLowerCase();
let resultado="";

datos.forEach(d=>{
if(d.titulo?.toLowerCase().includes(texto)){
resultado+=`<p><b>${d.titulo}</b>: ${d.contenido}</p>`;
}
});

document.getElementById("resultado").innerHTML=resultado||"No encontrado";
}

/* aplicar config al cargar */
window.onload=function(){

let modo=localStorage.getItem("modo");
let color=localStorage.getItem("color");
let fondo=localStorage.getItem("fondo");
let anuncio=localStorage.getItem("anuncio");

if(modo==="mantenimiento"){
document.body.innerHTML=`<div id="mantenimiento">XAERTH EN MANTENIMIENTO</div>`;
}

if(color){
document.body.style.background=color;
}

if(fondo){
document.body.style.backgroundImage=`url(${fondo})`;
document.body.style.backgroundSize="cover";
}

if(anuncio){
let div=document.createElement("div");
div.innerHTML=anuncio;
div.style.marginBottom="20px";
document.body.prepend(div);
}

}

</script></body>
</html>
