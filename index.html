<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAERTH</title><style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0f0c;
color:#d8ffe9;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#titulo{
font-size:40px;
color:#00ff9c;
margin-bottom:20px;
}

button{
padding:12px 20px;
border:1px solid #00ff9c;
background:transparent;
color:#00ff9c;
border-radius:10px;
cursor:pointer;
}

#registrosBtn{
position:fixed;
top:10px;
right:10px;
}

#listaRegistros{
display:none;
position:fixed;
top:50px;
right:10px;
background:#111;
border:1px solid #00ff9c;
padding:10px;
max-width:250px;
max-height:300px;
overflow:auto;
}
</style></head>
<body><button id="registrosBtn" onclick="verRegistros()">REGISTROS</button>

<div id="listaRegistros"></div><div id="titulo">XAERTH</div><button onclick="ingresarNombre()">Escriba su nombre</button>

<script>

function ingresarNombre(){

const nombre = prompt("Ingrese su nombre:");

if(!nombre || nombre.trim()===""){
return;
}

let registros = JSON.parse(localStorage.getItem("xaerth_registros")) || [];

registros.push({
nombre:nombre,
fecha:new Date().toLocaleString()
});

localStorage.setItem(
"xaerth_registros",
JSON.stringify(registros)
);

/* Redirigir */
window.location.href =
"https://drive.google.com/drive/folders/1LrCRhJeaz-eEYGim3b9ujXQnBJOJamf0";
}

function verRegistros(){

const caja=document.getElementById("listaRegistros");

let registros =
JSON.parse(localStorage.getItem("xaerth_registros")) || [];

if(caja.style.display==="block"){
caja.style.display="none";
return;
}

if(registros.length===0){
caja.innerHTML="Sin registros.";
}else{

caja.innerHTML="<b>Registros</b><hr>";

registros.forEach(r=>{
caja.innerHTML +=
`${r.nombre}<br><small>${r.fecha}</small><hr>`;
});
}

caja.style.display="block";
}

</script></body>
</html>
