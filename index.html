<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAERTH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--fondo:#0b0f0c;
--verde:#00ff9c;
--texto:#d8ffe9;
}

body{
background:var(--fondo);
color:var(--texto);
font-family:'Inter',sans-serif;
text-align:center;
margin:0;
}

/* TITULO */
h1{color:var(--verde);}

/* INPUT */
input{
padding:10px;
border-radius:15px;
border:1px solid var(--verde);
background:transparent;
color:var(--texto);
}

/* BOTONES */
button{
margin:5px;
padding:8px 15px;
border-radius:15px;
background:transparent;
border:1px solid var(--verde);
color:var(--verde);
}

/* ADMIN */
#panelBtn{
position:fixed;
bottom:20px;
right:20px;
}

/* REGISTROS */
#regBtn{
position:fixed;
top:10px;
right:10px;
display:none;
}

#regPanel{
display:none;
position:fixed;
top:50px;
right:10px;
background:black;
padding:10px;
max-height:300px;
overflow:auto;
}

/* MANTENIMIENTO */
#mantenimiento{
position:fixed;
width:100%;
height:100vh;
background:black;
color:var(--verde);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:25px;
}

/* CREDITOS */
#creditos h2{
font-family:'Orbitron';
color:var(--verde);
text-shadow:0 0 10px var(--verde);
}
</style>
</head>

<body>

<h1>XAERTH</h1>

<input id="search" placeholder="Buscar..." oninput="sugerir()">
<button onclick="buscar()">Entrar</button>

<div id="resultado"></div>

<button id="panelBtn" onclick="login()">PANEL</button>
<button id="regBtn" onclick="toggleReg()">REGISTROS</button>
<div id="regPanel"></div>

<script>

/* IDIOMA */
if(!navigator.language.startsWith("es")){
search.placeholder="Search...";
}

/* REGISTROS */
function guardarRegistro(txt){
let r=JSON.parse(localStorage.getItem("reg"))||[];
r.push(new Date().toLocaleString()+" - "+txt);
localStorage.setItem("reg",JSON.stringify(r));
}

function toggleReg(){
let p=regPanel;
p.style.display=p.style.display==="block"?"none":"block";
let r=JSON.parse(localStorage.getItem("reg"))||[];
p.innerHTML="<h3>REGISTROS</h3>";
r.slice().reverse().forEach(x=>p.innerHTML+="<p>"+x+"</p>");
}

/* MANTENIMIENTO */
if(localStorage.getItem("mant")=="on"){
document.body.innerHTML=`
<div id="mantenimiento">
XAERTH EN MANTENIMIENTO
<br><br>
<input id="clave" placeholder="ACCESO">
<button onclick="salir()">Entrar</button>
</div>`;
}

function salir(){
if(document.getElementById("clave").value==="2140"){
localStorage.removeItem("mant");
location.reload();
}else alert("Incorrecto");
}

/* ADMIN */
function login(){
let c=prompt("Clave:");
if(c==="2140"){
regBtn.style.display="block";
resultado.innerHTML=`
<h2>Panel Admin</h2>

<button onclick="mant()">Mantenimiento</button>

<br><input id="color" placeholder="Color">
<button onclick="cambiarColor()">Aplicar</button>

<br><input id="fondo" placeholder="URL Fondo">
<button onclick="cambiarFondo()">Aplicar</button>

<br><input id="mensaje" placeholder="Mensaje global">
<button onclick="mensaje()">Enviar</button>

<br><input id="fuente" placeholder="Fuente (ej: serif)">
<button onclick="cambiarFuente()">Aplicar</button>
`;
guardarRegistro("Admin entró");
}else alert("Incorrecto");
}

/* FUNCIONES ADMIN */
function mant(){
localStorage.setItem("mant","on");
location.reload();
}

function cambiarColor(){
document.body.style.color=color.value;
}

function cambiarFondo(){
document.body.style.background="url("+fondo.value+") center/cover";
}

function mensaje(){
alert(mensaje.value);
}

function cambiarFuente(){
document.body.style.fontFamily=fuente.value;
}

/* SUGERENCIAS */
function sugerir(){
let t=search.value.toLowerCase();
resultado.innerHTML="";

if(t.startsWith("c")){
resultado.innerHTML+=`<p onclick="usar('calculadora')">Calculadora</p>`;
resultado.innerHTML+=`<p onclick="usar('creditos')">Créditos</p>`;
}

if(t.startsWith("t")){
resultado.innerHTML+=`<p onclick="usar('traductor')">Traductor</p>`;
}

if(t.startsWith("r")){
resultado.innerHTML+=`<p onclick="usar('limites')">LIMITES</p>`;
}
}

/* USAR */
function usar(x){
search.value=x;
buscar();
}

/* BUSCAR */
function buscar(){
let t=search.value.toLowerCase();
guardarRegistro(t);

/* CALCULADORA */
if(t.includes("calculadora")){
resultado.innerHTML=`<input id="calc"><button onclick="calc()">=</button><div id="res"></div>`;
return;
}

/* TRADUCTOR SIMPLE */
if(t.includes("traductor")){
resultado.innerHTML=`<input id="txt"><button onclick="trad()">Traducir</button><div id="res"></div>`;
return;
}

/* TRADUCIR */
function trad(){
res.innerText=txt.value.split("").reverse().join("");
}

/* CREDITOS */
if(t.includes("creditos") || t.includes("créditos")){
resultado.innerHTML=`
<div id="creditos">

<p style="font-size:18px;">
Página web creada por: <b>LUCAS ☁️</b>, El 👁️
</p>

<p style="max-width:600px; margin:auto; line-height:1.6; opacity:0.9;">
En esta web queremos crear un navegador independiente, crear límites pero también libertad,
empezar de 0, explorar la IA, utilizar la inteligencia humana y artificial, observar y mantener todos los registros,
saber que es lo que hacen ellos/as, queremos mirar, administrar, jugar, pero también queremos límites y libertad,
queremos aprender, y utilizar Inteligencia Artificial tanto como humana, crear planes, y crear un futuro.
</p>

<h2 style="
margin-top:30px;
font-family:'Orbitron',sans-serif;
color:#00ff9c;
text-shadow:0 0 15px rgba(0,255,156,0.7);
letter-spacing:3px;
">
SOMOS XAERTH
</h2>

</div>
`;
return;
  }

/* LIMITES */
if(t.includes("limites")){
resultado.innerHTML=`<h2>PROXIMAMENTE</h2><div id="contador"></div>`;
setInterval(()=>{
let f=new Date("March 25 2026 19:57:00").getTime();
let n=new Date().getTime();
let d=f-n;
let h=Math.floor(d/3600000);
let m=Math.floor((d%3600000)/60000);
let s=Math.floor((d%60000)/1000);
contador.innerText=h+"h "+m+"m "+s+"s";
},1000);
return;
}

resultado.innerHTML="XAERTH procesando...";
}

/* CALC */
function calc(){
res.innerText=eval(calc.value);
}

</script>

</body>
</html>
