<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xaerth</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet"><style>

body{
background:#0b0b12;
color:#b46cff;
font-family:'Poppins',sans-serif;
text-align:center;
margin-top:120px;
}

/* responsive */
input{
width:90%;
max-width:350px;
}

/* glitch evento */
.evento{
animation:glitch 0.3s infinite;
color:red !important;
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(2px,-2px);}
60%{transform:translate(-2px,0);}
80%{transform:translate(2px,2px);}
100%{transform:translate(0);}
}

/* mantenimiento */
#mantenimiento{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
color:red;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
z-index:9999;
}

h1{
font-size:60px;
letter-spacing:3px;
}

button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#7b2cff;
color:white;
cursor:pointer;
}

#adminPanel{
display:none;
margin-top:30px;
}

#sugerencias{
width:90%;
max-width:350px;
margin:auto;
background:#151523;
border-radius:15px;
margin-top:5px;
}

.sugerencia{
padding:10px;
cursor:pointer;
color:white;
}

.sugerencia:hover{
background:#7b2cff;
}

</style></head><body><h1 id="titulo">Xaerth</h1><input id="search" placeholder="Buscar..." oninput="sugerir()">
<div id="sugerencias"></div><br><button onclick="buscar()" id="btnBuscar">Buscar</button>
<button onclick="login()">Modo Admin</button>

<div id="resultado"></div><div id="adminPanel"><h2>Panel Admin</h2><input id="tituloInput" placeholder="Nombre">
<br>
<input id="contenido" placeholder="Contenido">
<br>
<button onclick="guardar()">Guardar dato</button><hr><h3>Eventos globales</h3><button onclick="activarEvento()">Modo Evento</button>
<button onclick="activarMantenimiento()">Modo Mantenimiento</button>
<button onclick="desactivarTodo()">Desactivar</button>

<br><br>

<input id="mensajeGlobal" placeholder="Mensaje global">
<button onclick="guardarMensaje()">Guardar mensaje</button></div><script>

/* idioma */

let idioma = localStorage.getItem("idioma");

if(!idioma){
idioma = prompt("Idioma / Language / Idioma: es, en, pt");
localStorage.setItem("idioma",idioma);
}

function aplicarIdioma(){

if(idioma==="en"){
document.getElementById("btnBuscar").innerText="Search";
document.getElementById("search").placeholder="Search...";
}

if(idioma==="pt"){
document.getElementById("btnBuscar").innerText="Buscar";
document.getElementById("search").placeholder="Pesquisar...";
}

}

aplicarIdioma();

/* datos */

let datos = JSON.parse(localStorage.getItem("xaerth")) || [];

function guardar(){
let titulo=document.getElementById("tituloInput").value;
let contenido=document.getElementById("contenido").value;

datos.push({titulo,contenido});
localStorage.setItem("xaerth",JSON.stringify(datos));

alert("Guardado");
}

function buscar(){
let texto=document.getElementById("search").value.toLowerCase();
let resultado="";

datos.forEach(d=>{
if(d.titulo.toLowerCase().includes(texto)){
resultado+=`<p><b>${d.titulo}</b>: ${d.contenido}</p>`;
}
});

document.getElementById("resultado").innerHTML=
resultado || "No encontrado";
}

function login(){
let clave=prompt("Clave Admin:");

if(clave==="2140"){
document.getElementById("adminPanel").style.display="block";
alert("Modo Admin activado");
}else{
alert("Clave incorrecta");
}
}

/* sugerencias */

function sugerir(){
let texto=document.getElementById("search").value.toLowerCase();
let box=document.getElementById("sugerencias");

box.innerHTML="";

if(texto.startsWith("t")){
box.innerHTML += `
<div class="sugerencia"
onclick="window.location.href='https://whatisme12.github.io/xar/'">
Traductor Xaerth
</div>`;
}

if(texto.startsWith("c") || texto.includes("cal")){
box.innerHTML += `
<div class="sugerencia"
onclick="window.location.href='https://whatisme12.github.io/Calendario/'">
Calendario Xaerth
</div>`;
}

}

/* eventos admin */

function activarEvento(){
localStorage.setItem("modo","evento");
location.reload();
}

function activarMantenimiento(){
localStorage.setItem("modo","mantenimiento");
location.reload();
}

function desactivarTodo(){
localStorage.clear();
location.reload();
}

function guardarMensaje(){
let msg=document.getElementById("mensajeGlobal").value;
localStorage.setItem("mensaje",msg);
alert("Mensaje guardado");
}

/* aplicar eventos */

window.onload=function(){

let modo=localStorage.getItem("modo");
let mensaje=localStorage.getItem("mensaje");

if(modo==="evento"){
document.body.classList.add("evento");
}

if(modo==="mantenimiento"){
document.body.innerHTML=`<div id="mantenimiento">XAERTH EN MANTENIMIENTO</div>`;
}

if(mensaje){
let div=document.createElement("div");
div.style.marginTop="20px";
div.innerHTML=mensaje;
document.body.prepend(div);
}

};

</script></body>
</html>
